<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz App</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="quiz-container" id="quiz-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>General Knowledge Quiz</h1>
            <p>Test your brain! You have 15 seconds per question.</p>
            <button id="start-btn">Start Quiz</button>
            <div class="high-score-text">High Score: <span id="high-score-val">0</span></div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <div class="timer">Time Left: <span id="timer-sec">15</span>s</div>
                <div class="score-tracker">Score: <span id="current-score">0</span></div>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="question-box">
                <h2 id="question-text">Question goes here?</h2>
                <div id="options-container" class="options-grid">
                    <!-- Options generated by JS -->
                </div>
            </div>

            <button id="next-btn" class="hide">Next Question</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h2>Quiz Completed!</h2>
            <div class="final-score-circle">
                <span id="final-score">0</span>/<span id="total-questions">5</span>
            </div>
            <p id="result-message">Excellent Work!</p>
            <button id="restart-btn">Try Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
